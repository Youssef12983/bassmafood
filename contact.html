<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bassma Food | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container navbar">
      <a href="index.html" class="logo">Bassma <span>Food</span></a>
      <button class="menu-toggle" id="menuToggle">☰</button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="recipes.html">Recipes</a>
        <a href="recipe-details.html">Recipe Details</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <section class="page-banner">
    <div class="container reveal">
      <span class="section-label white-label">Contact</span>
      <h1>Get in Touch</h1>
      <p>Send us your message or recipe idea.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <form class="contact-form reveal">
        <div class="form-row">
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
        </div>
        <input type="text" placeholder="Subject" required>
        <textarea rows="7" placeholder="Write your message..." required></textarea>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-content">
      <h3>Bassma Food</h3>
      <p>We would love to hear from you.</p>
      <span>© 2026 Bassma Food. All rights reserved.</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
